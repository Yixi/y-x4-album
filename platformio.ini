[platformio]
default_envs = default
extra_configs = platformio.local.ini

[album]
version = 0.1.0

[base]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.37/platform-espressif32.zip
board = esp32-c3-devkitm-1
framework = arduino
monitor_speed = 115200
upload_speed = 921600
check_tool = cppcheck
check_flags = --enable=all --suppress=missingIncludeSystem --suppress=unusedFunction --suppress=unmatchedSuppression --suppress=*:*/.pio/* --inline-suppr
check_skip_packages = yes

board_upload.flash_size = 16MB
board_upload.maximum_size = 16777216
board_upload.offset_address = 0x10000

build_flags =
  -DARDUINO_USB_MODE=1
  -DARDUINO_USB_CDC_ON_BOOT=1
  -DEINK_DISPLAY_SINGLE_BUFFER_MODE=1
  -DDISABLE_FS_H_WARNING=1
  -DDESTRUCTOR_CLOSES_FILE=1
  -DUSE_UTF8_LONG_NAMES=1
  ; PNG decoder: support up to 2048px wide images
  -DPNG_MAX_BUFFERED_PIXELS=16416
  -Wno-bidi-chars
  -Wl,--wrap=panic_print_backtrace,--wrap=panic_abort
  -fno-exceptions
  -std=gnu++2a
  ; Compatibility define for shared HAL code
  -DCROSSPOINT_VERSION=\"album\"

build_unflags =
  -std=gnu++11
  -fexceptions

; Board configuration
board_build.flash_mode = dio
board_build.flash_size = 16MB
board_build.partitions = partitions.csv

extra_scripts =
  pre:scripts/gen_i18n.py

; Libraries - reuse open-x4-sdk from crosspoint-reader
lib_deps =
  BatteryMonitor=symlink://../../lib/crosspoint-reader/open-x4-sdk/libs/hardware/BatteryMonitor
  InputManager=symlink://../../lib/crosspoint-reader/open-x4-sdk/libs/hardware/InputManager
  EInkDisplay=symlink://../../lib/crosspoint-reader/open-x4-sdk/libs/display/EInkDisplay
  SDCardManager=symlink://../../lib/crosspoint-reader/open-x4-sdk/libs/hardware/SDCardManager
  bitbank2/PNGdec @ ^1.0.0
  bitbank2/JPEGDEC @ ^1.8.0

; Reuse HAL and renderer from crosspoint-reader
lib_extra_dirs =
  ../../lib/crosspoint-reader/lib

[env:default]
extends = base
build_flags =
  ${base.build_flags}
  -DALBUM_VERSION=\"dev\"
  -DENABLE_SERIAL_LOG
  -DLOG_LEVEL=2

[env:release]
extends = base
build_flags =
  ${base.build_flags}
  -DALBUM_VERSION=\"${album.version}\"
  -DENABLE_SERIAL_LOG
  -DLOG_LEVEL=1
